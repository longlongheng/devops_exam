---
- name: Task 3 - build, SQLite test, and MySQL backup on CHOICE_A web server
  hosts: webserver
  become: false
  vars:
    app_dir: /app
    mysql_host: mysql
    mysql_user: root
    mysql_password: Hello@123
    mysql_database: A-Heng_oulong-db

  tasks:
    - name: Remove generated task artifacts from previous runs
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ app_dir }}/backup.sql"
        - "{{ app_dir }}/test-output.txt"

    - name: Check for local changes before git pull
      command: git status --porcelain
      args:
        chdir: "{{ app_dir }}"
      register: git_status
      changed_when: false

    - name: Detect current git branch
      command: git rev-parse --abbrev-ref HEAD
      args:
        chdir: "{{ app_dir }}"
      register: git_branch
      changed_when: false

    - name: Stash local changes before pull
      command: git stash push --include-untracked --message "ansible pre-pull backup"
      args:
        chdir: "{{ app_dir }}"
      when: git_status.stdout | length > 0
      changed_when: true

    - name: Pull latest code from GitHub
      command: git pull origin {{ git_branch.stdout }}
      args:
        chdir: "{{ app_dir }}"

    - name: Build project using Maven without tests
      command: mvn clean package -DskipTests
      args:
        chdir: "{{ app_dir }}"

    - name: Run tests using SQLite test database
      command: mvn test
      args:
        chdir: "{{ app_dir }}"
      register: test_output

    - name: Save test output into file
      copy:
        content: "{{ test_output.stdout }}"
        dest: "{{ app_dir }}/test-output.txt"

    - name: Print test output
      debug:
        var: test_output.stdout_lines

    - name: Backup MySQL database
      shell: MYSQL_PWD='{{ mysql_password }}' mysqldump -h {{ mysql_host }} -u {{ mysql_user }} {{ mysql_database }} > {{ app_dir }}/backup.sql
      args:
        chdir: "{{ app_dir }}"

    - name: Show backup file
      command: ls -lh "{{ app_dir }}/backup.sql"
      register: backup_output
      changed_when: false

    - name: Print backup result
      debug:
        var: backup_output.stdout
